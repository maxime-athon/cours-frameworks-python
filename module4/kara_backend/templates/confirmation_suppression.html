{% extends "base.html" %}

{% block title %}Confirmer la suppression{% endblock %}

{% block content %}
<h1>Supprimer l'étudiant</h1>
<p>Êtes-vous sûr de vouloir supprimer (désactiver) l'étudiant <strong>{{ etudiant.nom_complet }}</strong> ?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
    <a href="{% url 'etudiants:liste' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
