{% extends "base.html" %}

{% block title %}{% if etudiant %}Modifier{% else %}Ajouter{% endif %} un Étudiant{% endblock %}

{% block content %}
<h1>{% if etudiant %}Modifier l'étudiant{% else %}Ajouter un nouvel étudiant{% endif %}</h1>
<hr>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    {{ form.as_p }}

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'etudiants:liste' %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>
{% endblock %}
